name: Daily Doctor Job Collector (Australia)

on:
  schedule:
    # 8:00 AM AEST = 22:00 UTC (previous day)
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run job collector
        run: python job_collector.py

      - name: Commit and push Job_Tracker.xlsx and logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Job_Tracker.xlsx logs/ || true
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Doctor jobs update - $(TZ=Australia/Sydney date +'%d %b %Y %H:%M AEST')"
          git push
